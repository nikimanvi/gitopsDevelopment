name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'          # every Monday at 06:00 UTC

jobs:
  # ──────────────────────────────────────────────────────────────
  # Dependency vulnerability scan (OWASP)
  # ──────────────────────────────────────────────────────────────
  dependency-check:
    name: Dependency Vulnerability Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - gateway-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            --no-transfer-progress
        working-directory: ./${{ matrix.service }}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-${{ matrix.service }}
          path: ${{ matrix.service }}/target/dependency-check-report.html
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Container image vulnerability scan (Trivy)
  # ──────────────────────────────────────────────────────────────
  trivy-scan:
    name: Container Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - gateway-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build \
            -t ${{ matrix.service }}:scan \
            ./${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'           # fail if CRITICAL or HIGH CVEs found

      - name: Upload Trivy SARIF results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
