spring:
  application:
    name: microservices-platform
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
  jackson:
    serialization:
      indent-output: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.app: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
# Microservices Configuration
service:
  user:
    url: http://localhost:8081
  product:
    url: http://localhost:8082
  order:
    url: http://localhost:8083
  timeout:
    connect: 5000  # 5 seconds
    read: 10000    # 10 seconds